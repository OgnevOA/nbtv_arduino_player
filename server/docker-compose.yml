# NBTV server: Telegram bot + encoder + pixel-stream, one container.
# TrueNAS Scale: Apps -> Custom App -> "Install via YAML" and paste this,
# then fill in the three x-marked values below (bot token, your user id, token).
services:
  nbtv:
    container_name: nbtv
    image: ghcr.io/ognevoa/nbtv-server:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      # --- secrets: fill these in ---
      BOT_TOKEN: xxx8857647:AAEUxxxxreplace-with-BotFather-token
      ALLOWED_USER_ID: '432856xxx'          # your numeric Telegram id
      DEVICE_TOKEN: nbtv-device-token-xxxx   # must match firmware secrets.h
      # --- tuning / paths (defaults are fine) ---
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: '32125'
      CACHE_DIR: /data/cache
      DEFAULT_SPEED: '0.95'
      DEFAULT_MAX_HEIGHT: '360'
    ports:
      - '32125:32125'                        # ESP32 hits http://<truenas-ip>:32125
    volumes:
      - /mnt/Media/app/nbtv:/data            # adjust to your dataset path

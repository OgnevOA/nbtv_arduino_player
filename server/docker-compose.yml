# NBTV server: Telegram bot + encoder + pixel-stream, one container.
# TrueNAS Scale: Apps -> Custom App -> "Install via YAML" and paste this.
# Set the secrets in a .env file next to this compose (see .env.example),
# or fill them into the environment block directly in the TrueNAS UI.
services:
  nbtv:
    # Option A: pull the CI-built image from GHCR (after you push to GitHub).
    image: ghcr.io/ognevoa/nbtv-server:latest
    # Option B: build locally instead of pulling (comment out `image:` above).
    # build: .
    container_name: nbtv
    restart: unless-stopped
    ports:
      - "8080:8080"          # ESP32 hits http://<truenas-ip>:8080
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ALLOWED_USER_ID: ${ALLOWED_USER_ID}
      DEVICE_TOKEN: ${DEVICE_TOKEN}
      DEFAULT_SPEED: "0.95"
      DEFAULT_MAX_HEIGHT: "360"
    volumes:
      - ./data:/data         # encoded .nbtvf cache (persists across restarts)

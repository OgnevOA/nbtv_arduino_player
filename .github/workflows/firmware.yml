name: firmware

on:
  push:
    branches: [main]
    paths: ["firmware/**", ".github/workflows/firmware.yml"]
    tags: ["v*"]
  pull_request:
    paths: ["firmware/**"]
  workflow_dispatch:

env:
  FQBN: esp32:esp32:m5stack-atom
  ESP32_INDEX: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core
        run: |
          arduino-cli config init --overwrite
          arduino-cli core update-index --additional-urls "$ESP32_INDEX"
          arduino-cli core install esp32:esp32 --additional-urls "$ESP32_INDEX"

      - name: Install libraries
        run: |
          arduino-cli lib install "M5Unified" "ArduinoJson" "M5Atomic-EchoBase"

      - name: Compile sketch
        run: |
          arduino-cli compile --fqbn "$FQBN" \
            --output-dir firmware/build firmware/nbtv_player

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nbtv-firmware
          path: firmware/build/nbtv_player.ino.bin

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/build/nbtv_player.ino.bin
